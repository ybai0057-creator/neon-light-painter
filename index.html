<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05070d" />
    <title>Neon Light Painter</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="stage" aria-label="Neon light painting camera experience">
      <video id="video" class="camera-feed" playsinline muted></video>
      <canvas id="trailCanvas" class="trail-canvas" aria-hidden="true"></canvas>

      <div class="vignette" aria-hidden="true"></div>
      <div class="scanline" aria-hidden="true"></div>

      <section class="hud" aria-label="Controls">
        <div class="brand">
          <span class="status-dot" id="statusDot"></span>
          <div>
            <h1>Neon Light Painter</h1>
            <p id="statusText">Move your index finger to paint with light</p>
          </div>
        </div>

        <div class="controls">
          <button id="startButton" class="button primary" type="button">Start Camera</button>
          <button id="clearButton" class="button" type="button" disabled>Clear</button>
          <button id="colorButton" class="button color-button" type="button" disabled>
            <span id="colorSwatch" class="color-swatch"></span>
            Change Color
          </button>
        </div>
      </section>

      <aside class="hint-panel" aria-live="polite">
        <span class="hint-label">Index fingertip</span>
        <span id="trackingState">Waiting for camera</span>
      </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
